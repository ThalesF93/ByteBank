global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'bytebank-accounts'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['bytebank-accounts:8082']

  - job_name: 'bytebank-customer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['bytebank-customer:8081']

  - job_name: 'bytebank-transactions'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['bytebank-transactions:8083']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']