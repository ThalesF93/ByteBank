server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: bytebank-accounts
          uri: lb://bytebank-accounts
          predicates:
            - Path=/api/v1/accounts/**

        - id: bytebank-customer
          uri: lb://bytebank-customer
          predicates:
            - Path=/api/v2/customers/**

        - id: bytebank-transactions
          uri: lb://bytebank-transactions
          predicates:
            - Path=/api/v1/transactions/**

        - id: bytebank-notification
          uri: lb://bytebank-notification
          predicates:
            - Path=/api/v1/notifications/**

        - id: bytebank-accounts-docs
          uri: lb://bytebank-accounts
          predicates:
            - Path=/bytebank-accounts/v3/api-docs
          filters:
            - RewritePath=/bytebank-accounts/v3/api-docs, /v3/api-docs

        - id: bytebank-customer-docs
          uri: lb://bytebank-customer
          predicates:
            - Path=/bytebank-customer/v3/api-docs
          filters:
            - RewritePath=/bytebank-customer/v3/api-docs, /v3/api-docs

        - id: bytebank-transactions-docs
          uri: lb://bytebank-transactions
          predicates:
            - Path=/bytebank-transactions/v3/api-docs
          filters:
            - RewritePath=/bytebank-transactions/v3/api-docs, /v3/api-docs

        - id: bytebank-notification-docs
          uri: lb://bytebank-notification
          predicates:
            - Path=/bytebank-notification/v3/api-docs
          filters:
            - RewritePath=/bytebank-notification/v3/api-docs, /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Accounts Service
        url: /bytebank-accounts/v3/api-docs
      - name: Customer Service
        url: /bytebank-customer/v3/api-docs
      - name: Transactions Service
        url: /bytebank-transactions/v3/api-docs
      - name: Notification Service
        url: /bytebank-notification/v3/api-docs