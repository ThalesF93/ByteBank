spring:
  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true
  mvc:
    problemdetails:
      enabled: false
  application:
    name: accounts
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
server:
  port: 8082
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
logging:
  structured:
    format:
      file: logstash
  file:
    name: logs/accounts.json